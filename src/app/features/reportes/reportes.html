<div class="card">
    <div class="filter-bar">
      <div class="field">
        <label>Tipo de reporte</label>
        <select [ngModel]="reportType()" (ngModelChange)="reportType.set($event)">
          @for (t of types; track t.value) {
            <option [value]="t.value">{{ t.label }}</option>
          }
        </select>
      </div>
      <div class="field">
        <label>&nbsp;</label>
        <button class="btn btn--primary" (click)="exportCSV()">
          <i class="bi bi-download"></i> Exportar CSV
        </button>
      </div>
    </div>
  </div>

  <div class="card mt-3">
    <div class="table-wrap">
      <table class="table">
        <thead>
          <tr>
            @for (c of columns(); track c.key) {
              <th>{{ c.label }}</th>
            }
          </tr>
        </thead>
        <tbody>
          @for (r of data(); track $index) {
            <tr>
              @for (c of columns(); track c.key) {
                <td>{{ $any(r)[c.key] }}</td>
              }
            </tr>
          } @empty {
            <tr><td [attr.colspan]="columns().length" class="text-muted" style="text-align:center;padding:24px">Sin datos</td></tr>
          }
        </tbody>
      </table>
    </div>
  </div>
