<div class="card" style="max-width:600px">
    <div class="card__title"><i class="bi bi-shield-lock"></i> Cambiar mi contraseña</div>

    <form #claveForm (submit)="submitClave(claveActual.value, claveNueva.value, claveConfirmar.value); $event.preventDefault()">
      <div class="field">
        <label>Clave actual *</label>
        <input #claveActual name="claveActual" type="password" placeholder="••••••••" required />
      </div>
      <div class="field">
        <label>Clave nueva *</label>
        <input #claveNueva name="claveNueva" type="password" placeholder="••••••••" required minlength="8" />
      </div>
      <div class="field">
        <label>Confirmar clave nueva *</label>
        <input #claveConfirmar name="claveConfirmar" type="password" placeholder="••••••••" required minlength="8" />
      </div>

      @if (errorMsg()) {
        <div class="alert alert--danger">
          <i class="bi bi-exclamation-triangle alert__icon"></i>
          <span>{{ errorMsg() }}</span>
        </div>
      }

      <div class="alert alert--warning">
        <i class="bi bi-exclamation-triangle alert__icon"></i>
        <span>La clave debe tener mínimo 8 caracteres. Se recomienda combinar mayúsculas, números y símbolos. Se almacena con hash BCrypt, nunca en texto plano.</span>
      </div>

      <div class="flex gap-2 mt-3" style="justify-content:flex-end">
        <button type="submit" class="btn btn--dark">
          @if (feedback()) {
            <i class="bi bi-check-lg"></i> {{ feedback() }}
          } @else {
            <i class="bi bi-check-lg"></i> Guardar clave
          }
        </button>
      </div>
    </form>

    <app-two-factor-auth />
  </div>
