<div class="card" style="max-width:640px">
  <div class="module-header" style="background:var(--color-secretaria);margin:-16px -16px 16px -16px;width:calc(100% + 32px)">
    <span>Nuevo Alumno</span>
    <button class="btn btn--sm" style="background:#fff" (click)="guardar()" [disabled]="loading()">Guardar</button>
  </div>

  <div class="field-row">
    <div class="field">
      <label>Código</label>
      <input value="Autogenerado" disabled />
    </div>
    <div class="field">
      <label>Tipo Documento *</label>
      <select [(ngModel)]="data.codTipoDocumento" required>
        <option value="" disabled>Seleccione</option>
        @for (td of tiposDocumento(); track td.id) {
        <option [value]="td.id">{{ td.descripcion }}</option>
        }
      </select>
    </div>
  </div>
  <div class="field-row">
    <div class="field">
      <label>Número Documento *</label>
      <input [(ngModel)]="data.numeroDocumento" placeholder="75412638" required />
    </div>
    <div class="field">
      <label>Nombres *</label>
      <input [(ngModel)]="data.nombres" placeholder="María Fernanda" required />
    </div>
  </div>
  <div class="field-row">
    <div class="field">
      <label>Apellido Paterno *</label>
      <input [(ngModel)]="data.apellidoPaterno" placeholder="Torres" required />
    </div>
    <div class="field">
      <label>Apellido Materno *</label>
      <input [(ngModel)]="data.apellidoMaterno" placeholder="Quispe" required />
    </div>
  </div>
  <div class="field">
    <label>Fecha de Nacimiento *</label>
    <input type="date" [(ngModel)]="data.fechaNacimiento" required />
  </div>

  @if (error()) {
  <div class="alert alert--danger mt-2">
    <i class="bi-exclamation-triangle alert__icon"></i>
    <span>{{ error() }}</span>
  </div>
  }

  <div class="alert alert--warning mt-2">
    <i class="bi-exclamation-triangle alert__icon"></i>
    <span>Los campos con * son obligatorios. Solo se permiten letras en Nombres y Apellidos.</span>
  </div>

  <div class="flex gap-2 mt-3" style="justify-content:flex-end">
    <button class="btn btn--outline" (click)="cancelar()" [disabled]="loading()">Cancelar</button>
    <button class="btn btn--primary" (click)="guardar()" [disabled]="loading()">Guardar</button>
  </div>
</div>
